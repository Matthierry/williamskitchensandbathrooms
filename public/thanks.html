<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank you | Williams Kitchens & Bathrooms</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #111827;
        color: #f9fafb;
      }
      .card {
        width: 100%;
        max-width: 36rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 0.75rem;
        background: rgba(0, 0, 0, 0.25);
        padding: 2rem;
        text-align: center;
      }
      h1 {
        margin: 0;
        font-size: clamp(1.75rem, 2vw + 1rem, 2.25rem);
      }
      p {
        margin: 1rem 0 0;
        color: #cbd5e1;
      }
      .button {
        margin-top: 1.5rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        border-radius: 0.75rem;
        padding: 0.75rem 1rem;
        font-weight: 600;
        text-decoration: none;
        background: #2563eb;
        border: 1px solid #2563eb;
        color: #fff;
      }
      .button:hover,
      .button:focus-visible {
        background: #1d4ed8;
        border-color: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Thank you, your enquiry has been sent.</h1>
      <p>We will get back to you as soon as possible.</p>
      <a class="button" href="https://williamskitchensandbathrooms.com/">Back to homepage</a>
    </main>
  </body>
</html>
